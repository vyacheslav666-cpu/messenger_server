services:
  messenger:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: emergency-messenger
    restart: unless-stopped
    environment:
      PORT: ${PORT:-8080}
      DATABASE_PATH: /app/data/chat.db
      RUST_LOG: ${RUST_LOG:-messenger_server=info}
    ports:
      - "${PUBLIC_PORT:-8080}:${PORT:-8080}"
    volumes:
      - messenger_data:/app/data

volumes:
  messenger_data:
