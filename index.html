<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наш Мессенджер</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .auth-container { background: #fff; border: 1px solid #ddd; padding: 30px; border-radius: 8px; width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; background: #007bff; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .toggle-link { text-align: center; font-size: 0.9em; margin-top: 15px; color: #555; }
        .toggle-link span { color: #007bff; cursor: pointer; text-decoration: underline; }
        .error-msg { color: red; font-size: 0.9em; text-align: center; margin-top: 10px; display: none; }
        .success-msg { color: green; font-size: 0.9em; text-align: center; margin-top: 10px; display: none; }

        .messenger-container { display: none; width: 90vw; max-width: 1000px; height: 85vh; background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .sidebar { width: 30%; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
        .user-profile { padding: 15px; border-bottom: 1px solid #eee; background: #f9f9f9; font-weight: bold; font-size: 1.1em; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { font-size: 0.75em; padding: 4px 8px; background: #dc3545; border-radius: 4px; border: none; color: white; cursor: pointer; }
        .search-box { padding: 10px; border-bottom: 1px solid #eee; display: flex; gap: 5px; }
        .search-box input { margin: 0; padding: 8px; font-size: 0.9em; }
        .search-box button { margin: 0; width: auto; padding: 8px 12px; }
        .contacts-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 12px 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; transition: 0.2s; }
        .contact-item:hover { background: #f0f7ff; }
        .contact-item.active { background: #e1f0ff; font-weight: bold; }

        .chat-area { width: 70%; display: flex; flex-direction: column; background: #fdfdfd; }
        .chat-header { padding: 15px; border-bottom: 1px solid #ddd; background: #fff; font-weight: bold; font-size: 1.1em; }
        .messages-display { flex: 1; padding: 20px; overflow-y: auto; background: #f4f4f7; }
        .chat-input-area { padding: 15px; background: #fff; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        .chat-input-area input { margin: 0; flex: 1; }
        .chat-input-area button { margin: 0; width: auto; padding: 10px 20px; }

        .msg-row { display: flex; margin-bottom: 10px; width: 100%; }
        .msg-row.my-msg { justify-content: flex-end; }
        .msg-cloud { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 0.95em; line-height: 1.4; word-break: break-word; }
        .msg-row.my-msg .msg-cloud { background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .msg-row.their-msg .msg-cloud { background: #e9e9eb; color: #333; border-bottom-left-radius: 2px; }
        .msg-time { font-size: 0.75em; margin-top: 4px; text-align: right; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="auth-container" id="authBox">
        <h3 id="formTitle">Войти в Мессенджер</h3>
        <input type="text" id="loginInput" placeholder="Введите логин">
        <input type="password" id="passInput" placeholder="Введите пароль">
        <input type="password" id="passConfirmInput" placeholder="Повторите пароль" style="display: none;">
        <button id="actionBtn" onclick="submitAuth()">Войти</button>
        <div class="error-msg" id="errorBlock"></div>
        <div class="success-msg" id="successBlock"></div>
        <div class="toggle-link" id="toggleBlock">
            Нет аккаунта? <span onclick="switchMode(true)">Зарегистрироваться</span>
        </div>
    </div>

    <div class="messenger-container" id="messengerBox">
        <div class="sidebar">
            <div class="user-profile">
                <span id="myUsername">Загрузка...</span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Найти человека по логину...">
                <button onclick="searchContact()">Найти</button>
            </div>
            <div class="contacts-list" id="contactsListBlock">
                <div style="padding:15px; color:#999; text-align:center; font-size:0.9em;">Список контактов пуст</div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="activeChatHeader">Выберите чат для начала общения</div>
            <div class="messages-display" id="messagesDisplayBlock"></div>
            <div class="chat-input-area">
                <input type="text" id="chatMessageInput" placeholder="Напишите сообщение..." disabled onkeydown="if(event.keyCode===13) sendChatMessage()">
                <button id="chatSendBtn" onclick="sendChatMessage()" disabled>Отправить</button>
            </div>
        </div>
    </div>

    <script>
        let isRegisterMode = false;
        let currentActiveChatUserId = null;
        let ws = null; // Глобальный веб-сокет

        const SERVER_IP = window.location.hostname; 
        const API_URL = `http://${SERVER_IP}:8080`;
        const WS_URL = `ws://${SERVER_IP}:8080/ws`;

        window.onload = function() {
            if (sessionStorage.getItem('userId')) {
                showMessengerUI();
            }
        };

        function showMessengerUI() {
            document.getElementById('authBox').style.display = 'none';
            document.getElementById('messengerBox').style.display = 'flex';
            document.getElementById('myUsername').innerText = sessionStorage.getItem('userLogin');
            
            // Инициализируем живое WebSocket соединение
            initWebSocket();
        }

        function initWebSocket() {
            const myId = sessionStorage.getItem('userId');
            ws = new WebSocket(`${WS_URL}?user_id=${myId}`);

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                
                // Если сейчас открыт чат именно с тем, кто прислал сообщение — рисуем на ходу
                if (msg.sender_id == currentActiveChatUserId) {
                    appendMessage(msg, 'their-msg');
                } else {
                    console.log("Прилетело сообщение в фоновом режиме от юзера ID:", msg.sender_id);
                }
            };

            ws.onclose = () => {
                console.log("Соединение WebSocket потеряно, перезапуск через 3 сек...");
                setTimeout(initWebSocket, 3000);
            };
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        function switchMode(toRegister) {
            isRegisterMode = toRegister;
            document.getElementById('errorBlock').style.display = 'none';
            document.getElementById('successBlock').style.display = 'none';
            if (isRegisterMode) {
                document.getElementById('formTitle').innerText = 'Регистрация';
                document.getElementById('passConfirmInput').style.display = 'block';
                document.getElementById('actionBtn').innerText = 'Создать аккаунт';
                document.getElementById('toggleBlock').innerHTML = 'Уже есть аккаунт? <span onclick="switchMode(false)">Войти</span>';
            } else {
                document.getElementById('formTitle').innerText = 'Войти в Мессенджер';
                document.getElementById('passConfirmInput').style.display = 'none';
                document.getElementById('actionBtn').innerText = 'Войти';
                document.getElementById('toggleBlock').innerHTML = 'Нет аккаунта? <span onclick="switchMode(true)">Зарегистрироваться</span>';
            }
        }

        async function submitAuth() {
            const login = document.getElementById('loginInput').value.trim();
            const pass = document.getElementById('passInput').value;
            const passConfirm = document.getElementById('passConfirmInput').value;

            if (!login || !pass) { return showError("Заполните все поля!"); }

            if (isRegisterMode) {
                if (pass !== passConfirm) { return showError("Пароли не совпадают!"); }
                try {
                    const response = await fetch(`${API_URL}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ login: login, password_hash: pass })
                    });
                    if (response.ok) {
                        document.getElementById('successBlock').innerText = "Успешно!";
                        document.getElementById('successBlock').style.display = 'block';
                        setTimeout(() => switchMode(false), 1200);
                    } else { showError(await response.text()); }
                } catch (e) { showError("Сервер офлайн"); }
            } else {
                try {
                    const response = await fetch(`${API_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ login: login, password_hash: pass })
                    });
                    if (response.ok) {
                        const userData = await response.json();
                        sessionStorage.setItem('userId', userData.user_id);
                        sessionStorage.setItem('userLogin', userData.login);
                        showMessengerUI();
                    } else { showError("Неверные данные"); }
                } catch (e) { showError("Сервер офлайн"); }
            }
        }

        function showError(text) {
            const errorBlock = document.getElementById('errorBlock');
            errorBlock.innerText = text; errorBlock.style.display = 'block';
        }

        async function searchContact() {
            const query = document.getElementById('searchInput').value.trim();
            if(!query) return;
            try {
                const response = await fetch(`${API_URL}/search?login=${query}`);
                if (response.ok) {
                    const users = await response.json();
                    const listBlock = document.getElementById('contactsListBlock');
                    listBlock.innerHTML = "";
                    if(users.length === 0) {
                        listBlock.innerHTML = `<div style="padding:15px; color:#999; text-align:center;">Никого не найдено</div>`;
                        return;
                    }
                    users.forEach(u => {
                        if(u.user_id == sessionStorage.getItem('userId')) return;
                        listBlock.innerHTML += `
                            <div class="contact-item" onclick="openChat(${u.user_id}, '${u.login}')" id="contact-${u.user_id}">
                                👤 ${u.login}
                            </div>
                        `;
                    });
                }
            } catch(e) { console.error(e); }
        }

        // ШАГ 4: ОТКРЫТИЕ ДИАЛОГА С ЗАГРУЗКОЙ ИСТОРИИ ИЗ БД
        async function openChat(targetUserId, login) {
            currentActiveChatUserId = targetUserId;
            const myId = sessionStorage.getItem('userId');
            
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`contact-${targetUserId}`);
            if(activeEl) activeEl.classList.add('active');

            document.getElementById('activeChatHeader').innerText = `Чат с пользователем: ${login}`;
            document.getElementById('chatMessageInput').disabled = false;
            document.getElementById('chatSendBtn').disabled = false;
            document.getElementById('chatMessageInput').focus();

            const display = document.getElementById('messagesDisplayBlock');
            display.innerHTML = `<div style="text-align:center; color:#999; font-size:0.85em; margin-bottom:15px;">Загрузка истории...</div>`;

            try {
                // Стучимся на сервер за прошлыми сообщениями этой пары юзеров
                const response = await fetch(`${API_URL}/messages?user_id=${myId}&target_id=${targetUserId}`);
                if (response.ok) {
                    const messages = await response.json();
                    display.innerHTML = "";
                    
                    messages.forEach(msg => {
                        const type = (msg.sender_id == myId) ? 'my-msg' : 'their-msg';
                        appendMessage(msg, type);
                    });
                }
            } catch(e) {
                console.error("Не удалось подгрузить историю:", e);
            }
        }

        function sendChatMessage() {
            const input = document.getElementById('chatMessageInput');
            const text = input.value.trim();
            if(!text || !currentActiveChatUserId || !ws) return;

            const myId = parseInt(sessionStorage.getItem('userId'));
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const msgPacket = {
                sender_id: myId,
                receiver_id: currentActiveChatUserId,
                text: text,
                timestamp: time
            };

            // Отправляем JSON пакет в WebSocket
            ws.send(JSON.stringify(msgPacket));
            
            // Сразу выводим у себя на экране
            appendMessage(msgPacket, 'my-msg');
            
            input.value = "";
        }

        function appendMessage(msg, type) {
            const display = document.getElementById('messagesDisplayBlock');
            // Если время прилетело в формате базы данных (ГГГГ-ММ-ДД ЧЧ:ММ:СС), форматируем красиво
            let displayTime = msg.timestamp;
            if(displayTime.includes('-')) {
                displayTime = displayTime.split(' ')[1].substring(0, 5);
            }

            display.innerHTML += `
                <div class="msg-row ${type}">
                    <div class="msg-cloud">
                        <div>${msg.text}</div>
                        <div class="msg-time">${displayTime}</div>
                    </div>
                </div>
            `;
            display.scrollTop = display.scrollHeight;
        }
    </script>
</body>
</html>
