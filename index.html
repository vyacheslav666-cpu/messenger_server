<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Групповой Чат</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fafafa; }
        #chat { border: 1px solid #ddd; background: #fff; height: 400px; overflow-y: auto; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .msg-box { margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; background: #f1f0f0; width: fit-content; max-width: 80%; }
        .msg-meta { font-size: 0.8em; color: #777; margin-bottom: 3px; }
        .msg-meta b { color: #333; }
        .msg-text { font-size: 0.95em; word-break: break-word; }
        input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; border: none; background: #007bff; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Комната Чата</h2>
    <div id="chat"></div>
    <input type="text" id="msgInput" placeholder="Напиши что-нибудь..." onkeydown="if(event.keyCode===13) send()">
    <button onclick="send()">Отправить</button>

    <script>
        // Запрашиваем имя юзера при входе
        const username = prompt("Введите ваше имя для чата:") || "Аноним";

        // МАГИЯ: Автоматически берем IP ноутбука, с которого телефон скачал эту страницу
        const SERVER_IP = window.location.hostname; 
        
        // Подключаемся к Rust на порт 8080
        const ws = new WebSocket(`ws://${SERVER_IP}:8080/ws`);
        const chat = document.getElementById('chat');

        ws.onopen = () => {
            chat.innerHTML += `<p style="color:green; font-size:0.9em;"><i>Система: Успешное подключение под именем <b>${username}</b></i></p>`;
        };

        ws.onmessage = (event) => {
            try {
                // Парсим прилетевший от Rust JSON-пакет
                const data = JSON.parse(event.data);
                
                // Выводим сообщение на экран с именем и временем
                chat.innerHTML += `
                    <div class="msg-box">
                        <div class="msg-meta"><b>${data.user}</b> <small>[${data.time}]</small></div>
                        <div class="msg-text">${data.text}</div>
                    </div>
                `;
                chat.scrollTop = chat.scrollHeight;
            } catch(e) {
                console.error("Ошибка парсинга JSON:", event.data);
            }
        };

        ws.onclose = () => {
            chat.innerHTML += `<p style="color:red; font-size:0.9em;"><i>Система: Соединение с сервером потеряно.</i></p>`;
        };

        function send() {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                
                // Упаковываем данные в объект
                const msgPacket = {
                    user: username,
                    text: input.value,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                };

                // Переводим в строку и шлем в сокет Rust-сервера
                ws.send(JSON.stringify(msgPacket));
                
                input.value = "";
            }
        }
    </script>
</body>
</html>
